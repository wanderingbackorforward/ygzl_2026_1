<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字孪生隧道 - 3D漫游平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ---- Reset ---- */
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #0a1628; }
        #viewer-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        #viewer-canvas { display: block; width: 100%; height: 100%; }

        /* ---- Loading ---- */
        #loading-indicator {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #0a1628; color: #00e5ff; font-family: 'Rajdhani', monospace;
            font-size: 18px; z-index: 100; transition: opacity 0.6s;
        }
        #loading-indicator.hidden { opacity: 0; pointer-events: none; }
        .loading-spinner {
            width: 40px; height: 40px; border: 2px solid rgba(0,229,255,0.2);
            border-top-color: #00e5ff; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---- All HUD elements: hidden by default, fade on hover ---- */
        .hud { opacity: 0; transition: opacity 0.4s; pointer-events: none; }
        body:hover .hud, body.show-hud .hud { opacity: 1; pointer-events: auto; }

        /* ---- Toolbar (bottom-center, single row) ---- */
        #toolbar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 50; display: flex; align-items: center; gap: 2px;
            background: rgba(10, 22, 40, 0.85); border: 1px solid rgba(0,229,255,0.2);
            border-radius: 28px; padding: 4px 6px;
            font-family: 'Rajdhani', sans-serif; backdrop-filter: blur(12px);
        }
        .tb-btn {
            width: 36px; height: 36px; border: none; border-radius: 50%;
            background: transparent; color: #7eb8c9; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: all 0.15s;
        }
        .tb-btn:hover { background: rgba(0,229,255,0.15); color: #fff; }
        .tb-btn.active { background: rgba(0,229,255,0.3); color: #fff; }
        .tb-sep { width: 1px; height: 20px; background: rgba(0,229,255,0.15); margin: 0 2px; }
        .tb-label {
            color: #00e5ff; font-size: 13px; font-weight: 600;
            padding: 0 10px; white-space: nowrap; min-width: 70px; text-align: center;
        }

        /* ---- Mileage badge (top-center, minimal) ---- */
        #mileage-badge {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            z-index: 50; background: rgba(10, 22, 40, 0.7); border: 1px solid rgba(0,229,255,0.2);
            border-radius: 20px; padding: 5px 18px;
            font: 600 14px 'Rajdhani', monospace; color: #00e5ff;
            backdrop-filter: blur(8px);
        }

        /* ---- Crosshair ---- */
        #crosshair {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 40;
            pointer-events: none; display: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(0,229,255,0.5);
        }
        #crosshair::before { width: 14px; height: 1.5px; top: -0.75px; left: -7px; }
        #crosshair::after { width: 1.5px; height: 14px; top: -7px; left: -0.75px; }

        /* ---- Minimap (top-right, smaller) ---- */
        #minimap {
            position: fixed; top: 16px; right: 16px; z-index: 50;
            width: 130px; height: 100px; background: rgba(10, 22, 40, 0.7);
            border: 1px solid rgba(0,229,255,0.2); border-radius: 8px;
            overflow: hidden;
        }
        #minimap canvas { width: 100%; height: 100%; }

        /* ---- Point list toggle ---- */
        #point-toggle {
            position: fixed; bottom: 70px; left: 16px; z-index: 50;
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(10, 22, 40, 0.85); border: 1px solid rgba(0,229,255,0.2);
            color: #7eb8c9; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 14px;
            backdrop-filter: blur(8px); transition: all 0.2s;
        }
        #point-toggle:hover { background: rgba(0,229,255,0.15); color: #fff; }
        #point-toggle.open { background: rgba(0,229,255,0.25); color: #fff; }
        #point-list {
            position: fixed; bottom: 70px; left: 60px; z-index: 50;
            background: rgba(10, 22, 40, 0.92); border: 1px solid rgba(0,229,255,0.2);
            border-radius: 8px; width: 200px; max-height: 320px;
            font-family: 'Rajdhani', sans-serif; backdrop-filter: blur(12px);
            display: none; flex-direction: column; overflow: hidden;
        }
        #point-list.open { display: flex; }
        #point-list .pl-title {
            padding: 8px 12px; font-size: 13px; color: #00e5ff;
            border-bottom: 1px solid rgba(0,229,255,0.1); font-weight: 600; flex-shrink: 0;
        }
        #point-list .pl-body { overflow-y: auto; flex: 1; min-height: 0; padding: 2px 0; }
        #point-list .pl-item {
            padding: 5px 12px; font-size: 12px; color: #e0f7fa; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        #point-list .pl-item:hover { background: rgba(0,229,255,0.1); }
        .pl-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

        /* ---- Tour progress (inline in toolbar) ---- */
        #tour-progress {
            display: none; width: 80px; height: 3px;
            background: rgba(0,229,255,0.15); border-radius: 2px; overflow: hidden;
        }
        #tour-progress.active { display: block; }
        #tour-bar { width: 0%; height: 100%; background: #00e5ff; border-radius: 2px; transition: width 0.3s; }

        /* ---- Notification ---- */
        .compact-nav { display: none; }
    </style>
</head>
<body>
    <div id="viewer-container">
        <canvas id="viewer-canvas"></canvas>
    </div>

    <div id="loading-indicator">
        <div class="loading-spinner"></div>
        <div>正在生成隧道场景...</div>
    </div>

    <div id="crosshair"></div>

    <!-- Mileage: the only always-visible element -->
    <div id="mileage-badge">K0+000</div>

    <!-- Everything else fades in on mouse move -->
    <div id="toolbar" class="hud">
        <button class="tb-btn active" data-mode="orbit" onclick="window.setNavMode('orbit')" title="轨道视角">
            <i class="fas fa-eye"></i>
        </button>
        <button class="tb-btn" data-mode="fps" onclick="window.setNavMode('fps')" title="第一人称">
            <i class="fas fa-walking"></i>
        </button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="window.startAutoTour()" title="自动巡航">
            <i class="fas fa-play"></i>
        </button>
        <button class="tb-btn" onclick="window.stopAutoTour()" title="停止巡航">
            <i class="fas fa-stop"></i>
        </button>
        <div id="tour-progress"><div id="tour-bar"></div></div>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="window.resetCamera()" title="复位">
            <i class="fas fa-home"></i>
        </button>
    </div>

    <div id="minimap" class="hud"><canvas id="minimap-canvas"></canvas></div>

    <div id="point-toggle" class="hud" onclick="window.togglePointList()">
        <i class="fas fa-list"></i>
    </div>
    <div id="point-list">
        <div class="pl-title"><i class="fas fa-map-marker-alt"></i> 监测点</div>
        <div class="pl-body" id="point-list-body"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
    <script src="js/three_viewer_enhanced.js"></script>
</body>
</html>
