<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盾构机轨迹展示系统</title>
    <link rel="stylesheet" href="/shield-trajectory/css/style.css">
    <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=HFZWT6J2CydU493RTVN4p4rCClAbxsBW"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>盾构机轨迹展示系统</h1>
        </header>

        <main class="main-content">
            <!-- 控制面板 -->
            <section class="control-panel">
                <div class="control-group">
                    <label for="maxPoints">最多轨迹显示点数：</label>
                    <input type="number" id="maxPoints" min="1" max="10000" value="10000" class="input-number">
                    <button id="calculateBtn" class="btn btn-primary">查看历史轨迹</button>
                </div>

                <!-- 数据导入区域 -->
                <div class="import-section">
                    <h3>数据导入</h3>
                    <div class="import-controls">
                        <div class="file-upload">
                            <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.json" class="file-input">
                            <label for="fileInput" class="file-label">
                                <span class="file-icon">📁</span>
                                <span class="file-text">选择文件 (CSV/Excel/JSON)</span>
                            </label>
                        </div>
                        <button id="importBtn" class="btn btn-success">导入数据</button>
                        <button id="loadSampleBtn" class="btn btn-secondary">加载示例数据</button>
                    </div>

                    <!-- 已导入数据列表 -->
                    <div id="importedDataList" class="data-list hidden">
                        <h4>已导入的数据：</h4>
                        <select id="dataSelect" class="data-select">
                            <option value="">请选择数据</option>
                        </select>
                        <button id="useDataBtn" class="btn btn-primary">使用此数据</button>
                    </div>
                </div>
            </section>

            <!-- 标签页导航 -->
            <section class="tab-navigation">
                <div class="tab-buttons">
                    <button class="tab-btn active" data-tab="data">轨迹数据</button>
                    <button class="tab-btn" data-tab="chart">轨迹图</button>
                    <button class="tab-btn" data-tab="physical">物理轨迹</button>
                </div>
            </section>

            <!-- 标签页内容 -->
            <section class="tab-content">
                <!-- 轨迹数据标签页 -->
                <div id="data-tab" class="tab-pane active">
                    <div id="loading-indicator" class="loading hidden">
                        <div class="spinner"></div>
                        <p>正在加载轨迹数据...</p>
                    </div>

                    <div id="data-content" class="data-content">
                        <div class="table-container">
                            <table id="trajectory-table" class="data-table">
                                <thead id="table-header"></thead>
                                <tbody id="table-body"></tbody>
                            </table>
                        </div>

                        <!-- 分页控件 -->
                        <div id="pagination" class="pagination hidden">
                            <div class="pagination-info">
                                <span>第 <input type="number" id="page-input" class="page-input" min="1"> / <span id="total-pages">1</span> 页</span>
                                <span>（共 <span id="total-records">0</span> 条，每页 10 条）</span>
                            </div>
                            <div class="pagination-controls">
                                <button id="prev-page" class="btn btn-secondary">上一页</button>
                                <button id="next-page" class="btn btn-secondary">下一页</button>
                            </div>
                        </div>
                    </div>

                    <div id="empty-data" class="empty-state">
                        <p>暂无轨迹数据</p>
                        <p>请先点击"查看历史轨迹"按钮</p>
                    </div>
                </div>

                <!-- 轨迹图标签页 -->
                <div id="chart-tab" class="tab-pane">
                    <div id="chart-loading" class="loading hidden">
                        <div class="spinner"></div>
                        <p>正在加载轨迹图...</p>
                    </div>

                    <div id="chart-content" class="chart-content">
                        <div class="image-switcher">
                            <div class="image-controls">
                                <button id="prev-image" class="btn btn-secondary" disabled>←</button>
                                <span id="image-counter">1 / 1</span>
                                <button id="next-image" class="btn btn-secondary" disabled>→</button>
                            </div>
                            <div class="image-title" id="image-title">轨迹图</div>
                            <div class="image-container">
                                <img id="chart-image" src="" alt="轨迹图" class="chart-image hidden">
                            </div>
                        </div>
                    </div>

                    <div id="empty-chart" class="empty-state">
                        <p>暂无轨迹图</p>
                        <p>请先点击"查看历史轨迹"按钮</p>
                    </div>
                </div>

                <!-- 物理轨迹标签页 -->
                <div id="physical-tab" class="tab-pane">
                    <div id="physical-loading" class="loading hidden">
                        <div class="spinner"></div>
                        <p>正在加载物理轨迹...</p>
                    </div>

                    <div id="physical-content" class="physical-content hidden">
                        <!-- 轨迹图片区域 -->
                        <div class="trajectory-images">
                            <div class="image-section">
                                <h4>平面轨迹</h4>
                                <div id="baidu-map" class="baidu-map"></div>
                                <div id="map-help" class="map-help hidden">
                                    <p>💡 百度地图无法显示？请检查：</p>
                                    <ul>
                                        <li>网络连接是否正常</li>
                                        <li>百度地图API密钥是否有效</li>
                                        <li>浏览器是否允许加载外部脚本</li>
                                    </ul>
                                </div>
                            </div>

                            <div class="image-section">
                                <h4>纵面轨迹</h4>
                                <div class="profile-trajectory">
                                    <div class="profile-container">
                                        <img src="images/ProfileView.png" alt="基础剖面图" class="base-profile">
                                        <canvas id="profile-canvas" class="profile-canvas"></canvas>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 进度条和播放控制 -->
                        <div class="trajectory-controls">
                            <div class="progress-section">
                                <div class="progress-info">
                                    <span>当前点: <span id="current-point">1</span> / <span id="max-point">1</span></span>
                                    <span id="coordinates" class="coordinates">坐标: (0, 0)</span>
                                </div>

                                <div class="progress-bar-container">
                                    <input type="range" id="progress-bar" class="progress-bar" min="0" max="0" value="0">
                                    <div class="progress-labels">
                                        <span>起点 (0)</span>
                                        <span>终点 (0)</span>
                                    </div>
                                </div>
                            </div>

                            <div class="playback-controls">
                                <div class="control-inputs">
                                    <label>点位步长:</label>
                                    <input type="number" id="play-step" min="1" value="1" class="control-input">
                                    <label>帧间隔(ms):</label>
                                    <input type="number" id="frame-interval" min="100" step="100" value="500" class="control-input">
                                </div>
                                <div class="control-buttons">
                                    <button id="start-playback" class="btn btn-success">开始播放</button>
                                    <button id="stop-playback" class="btn btn-danger" disabled>停止播放</button>
                                    <button id="reset-to-start" class="btn btn-secondary">回到起点</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="empty-physical" class="empty-state">
                        <p>暂无轨迹数据，请先查看历史轨迹</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- 错误提示 -->
        <div id="error-toast" class="toast error-toast hidden">
            <span id="error-message"></span>
            <button id="close-error" class="close-btn">&times;</button>
        </div>

        <!-- 成功提示 -->
        <div id="success-toast" class="toast success-toast hidden">
            <span id="success-message"></span>
            <button id="close-success" class="close-btn">&times;</button>
        </div>
    </div>

    <script src="/shield-trajectory/js/api.js"></script>
    <script src="/shield-trajectory/js/mapManager.js"></script>
    <script src="/shield-trajectory/js/profileRenderer.js"></script>
    <script src="/shield-trajectory/js/trajectoryManager.js"></script>
    <script src="/shield-trajectory/js/main.js"></script>
</body>
</html>
